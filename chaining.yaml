    type: http
    behavior: domain
    format: mrs
    url: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/gfw.mrs"
    path: ./ruleset/gfw.mrs
    interval: 86400

# ----------------------------------------------------------
# 6. 路由规则 (瀑布流向下匹配机制)
# ----------------------------------------------------------
rules:
  # --- 优先级最高：个人绝对白名单 ---
  - RULE-SET,mydirect,DIRECT

  # --- 链式代理：强制解析被墙自建 VPS 的入口 IP ---
  - DOMAIN,idc-us.tedzhao.eu.org,🚪 入口节点,no-resolve
  - IP-CIDR,198.23.190.46/32,🚪 入口节点,no-resolve

  # --- 局域网保命规则 (提权至广告拦截前，防误杀) ---
  - RULE-SET,lan_list,DIRECT

  # --- 广告全局屏蔽 ---
  - RULE-SET,ban_ad,广告拦截

  # --- 防止国内 AI 屏蔽海外 IP，强制走代理 ---
  - DOMAIN-KEYWORD,deepseek,拥抱自由
  - DOMAIN-KEYWORD,qwen,拥抱自由

  # --- 海外专项分流 ---
  - RULE-SET,ai_list,人工智能
  - RULE-SET,netflix_list,Netflix
  - RULE-SET,tiktok_list,TikTok
  - RULE-SET,twitter_list,Twitter
  - RULE-SET,onedrive_list,Onedrive

  # --- 境内服务全直连 (域名与规则库匹配) ---
  - GEOSITE,apple,DIRECT
  - RULE-SET,china_domain,DIRECT
  - RULE-SET,china_ip,DIRECT,no-resolve      # 🌟 已修正：遇到域名直接跳过，防止 DNS 发呆
  - RULE-SET,google_cn,DIRECT
  - RULE-SET,steam_cn,DIRECT
  - RULE-SET,download_list,DIRECT

  # --- 境外服务走代理 ---
  #- DOMAIN-KEYWORD,hongxingyunmovie.vip,无限流量
  - RULE-SET,mywebsite,拥抱自由
  - RULE-SET,proxy_gfw,拥抱自由

  # --- 终极物理兜底判定 (防止漏网 IP) ---
  - GEOIP,LAN,DIRECT,no-resolve              # 最后的局域网 IP 防线
  - GEOIP,CN,DIRECT,no-resolve               # 🌟 已修正：不解析域名，纯 IP 请求才走这里
  - MATCH,漏网之鱼                            # 剩下的全走代理
