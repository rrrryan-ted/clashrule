# ==========================================================
# Mihomo (Clash.Meta) 最终全功能全接管配置文件 (典藏版)
# 特性：新版 dialer-proxy 链式代理 + Rule 模式 Fake-IP 过滤 + H3 极速解析
# 优化：彻底解决国内 IP 规则引起的 DNS 解析阻塞 (no-resolve 修正)
# 适用环境：多端通用（软路由精确劫持防 Docker 冲突，移动端自动越权全局接管）
# ==========================================================

# ----------------------------------------------------------
# 0. 基础端口与控制面板设置
# ----------------------------------------------------------
port: 7890
socks-port: 7891
mixed-port: 7893
tproxy-port: 7894
ipv6: false
mode: rule                   # 规则分流模式
log-level: warning           # 警告级别（大幅降低 iOS 内存占用和日志写入负担）
allow-lan: true              # 允许局域网设备接入
unified-delay: true          # 统一延迟（计算真实到达落地节点的延迟）
external-controller: 0.0.0.0:9090
secret: "123456"             # 控制面板访问密码

# ----------------------------------------------------------
# 1. 透明代理接管 (Tun 模式)
# ----------------------------------------------------------
tun:
  enable: true
  stack: system
  auto-route: true           # 自动配置系统路由
  auto-detect-interface: true
  # DNS 劫持设定：指向软路由网关。在 iOS/Android 等移动端，客户端会自动覆盖并进行全局劫持。
  dns-hijack:
    - 192.168.1.1:53          
    - "tcp://192.168.1.1:53"  

# ----------------------------------------------------------
# 2. DNS 防泄漏核心与极速响应引擎
# ----------------------------------------------------------
dns:
  enable: true
  listen: 0.0.0.0:1053
  ipv6: false
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16

  # --- 🌟 核心升级：启用 Rule 模式的 Fake-IP 过滤 ---
  fake-ip-filter-mode: rule
  fake-ip-filter:
    # 1. 本地与局域网环境防断联 (保护内网发现与 NAS 等设备互联)
    - DOMAIN-SUFFIX,lan,real-ip
    - DOMAIN-SUFFIX,localdomain,real-ip
    - GEOSITE,private,real-ip
    # 2. 境内服务、特殊协议防断联 (去除 CN 后，国内普通网页可享受 0ms 假 IP 首开响应)
    - GEOSITE,cn,real-ip
    - GEOSITE,microsoft,real-ip
    - GEOSITE,apple,real-ip
    - GEOSITE,steam@cn,real-ip
    - DOMAIN-KEYWORD,stun,real-ip    # 保护 P2P 与游戏打洞
    - DOMAIN-KEYWORD,ntp,real-ip     # 保护时间同步协议
    # 3. 兜底规则：没有命中直连白名单的，全部给假 IP 进行代理接管
    - MATCH,fake-ip

  # --- 🌟 神技：开启 H3 自动协商 (移动端网络切换防假死) ---
  prefer-h3: true

  # 基础 DNS (用于解析 DoH 域名自身的 IP，必须用国内纯 IP UDP 保证最快)
  default-nameserver:
    - 223.5.5.5
    - 119.29.29.29

  # 代理服务器专用解析 (节点寻址必须纯 IP，防止节点域名解析死锁)
  proxy-server-nameserver:
    - 223.5.5.5
    - 119.29.29.29

  # 默认兜底 DNS（境外与未知域名解析，全部使用加密协议防 GFW 污染）
  nameserver:
    - https://dns.hinet.net/dns-query    # 中华电信，负责超低延迟解析
    - https://dns.google/dns-query       # 谷歌，负责 H3 0-RTT 热启动救场
    - https://1.1.1.1/dns-query          # Cloudflare 备用

  # 强制分流策略（国内域名直接并发请求国内 DNS，不走国外兜底）
  nameserver-policy:
    "geosite:cn,private,apple,microsoft": [https://dns.alidns.com/dns-query, https://doh.pub/dns-query, 223.5.5.5, 119.29.29.29]
    "rule-set:china_domain": [https://dns.alidns.com/dns-query, https://doh.pub/dns-query, 223.5.5.5, 119.29.29.29]
    "rule-set:mydirect": [https://dns.alidns.com/dns-query, https://doh.pub/dns-query, 223.5.5.5, 119.29.29.29]

# ----------------------------------------------------------
# 3. 代理集合 (节点订阅)
# ----------------------------------------------------------
proxy-providers:
  Self-Built:
    type: http
    url: "订阅地址"
    interval: 3600
    path: ./proxies/sb.yaml
    health-check: {enable: true, interval: 600, url: https://www.gstatic.com/generate_204}
  Provider-01:
    type: http
    url: "订阅地址"
    interval: 3600
    path: ./proxies/p1.yaml
    health-check: {enable: true, interval: 600, url: https://www.gstatic.com/generate_204}
  Provider-02:
    type: http
    url: "订阅地址"
    interval: 3600
    path: ./proxies/p2.yaml
    health-check: {enable: true, interval: 600, url: https://www.gstatic.com/generate_204}
  Provider-03:
    type: http
    url: "订阅地址"
    interval: 3600
    path: ./proxies/p3.yaml
    health-check: {enable: true, interval: 600, url: https://www.gstatic.com/generate_204}
  Provider-04:
    type: http
    url: "订阅地址"
    interval: 3600
    path: ./proxies/p4.yaml
    health-check: {enable: true, interval: 600, url: https://www.gstatic.com/generate_204}

# ----------------------------------------------------------
# 4. 策略组 (流量调度器)
# ----------------------------------------------------------
proxy-groups:
  - name: 拥抱自由
    type: select
    proxies: [自动选择, 🚪 入口节点, 🔗 链式落地, 🏠 自建节点, 香港节点, 台湾节点, 狮城节点, 日韩节点, 美国节点, 欧盟节点, 其他节点, 无限流量]

  - name: 自动选择
    type: url-test
    url: https://www.gstatic.com/generate_204
    interval: 300  # 测速间隔 5 分钟，降低内存溢出风险
    use: [Self-Built, Provider-01, Provider-02, Provider-03, Provider-04]

  - name: 🚪 入口节点
    type: select
    use: [Self-Built, Provider-01, Provider-02, Provider-03, Provider-04]
    filter: "🇭🇰|🇹🇼|🇯🇵|🇸🇬|Fremont|Nuremberg|Frankfurt|Los Angeles"

  # --- 🌟 高级应用：链式代理，用于救活被墙的自建节点 ---
  - name: 🔗 链式落地
    type: select
    dialer-proxy: 🚪 入口节点
    use: [Self-Built]

  - name: 🏠 自建节点
    type: select
    use: [Self-Built]
    
  - name: 人工智能
    type: select
    proxies: [拥抱自由, 自动选择, 🔗 链式落地, 台湾节点, 狮城节点, 日韩节点, 美国节点, 欧盟节点, 其他节点, 无限流量]

  - name: Netflix
    type: select
    proxies: [拥抱自由, 自动选择, 🔗 链式落地, 香港节点, 台湾节点, 狮城节点, 日韩节点, 美国节点, 欧盟节点, 其他节点, 无限流量]

  - name: TikTok
    type: select
    proxies: [拥抱自由, 自动选择, 🔗 链式落地, 香港节点, 台湾节点, 狮城节点, 日韩节点, 美国节点, 欧盟节点, 其他节点, 无限流量]

  - name: Twitter
    type: select
    proxies: [拥抱自由, 自动选择, 🔗 链式落地, 香港节点, 台湾节点, 狮城节点, 日韩节点, 美国节点, 欧盟节点, 其他节点, 无限流量]

  - name: Onedrive
    type: select
    proxies: [拥抱自由, 自动选择, 🔗 链式落地, 香港节点, 台湾节点, 狮城节点, 日韩节点, 美国节点, 欧盟节点, 其他节点, 无限流量]
   
  # --- 各国地区节点自动测速 (均为 5 分钟间隔防卡死) ---
  - name: 香港节点
    type: url-test
    filter: "🇭🇰(?!.*(?!🇨🇳)[🇦-🇿]{2})"
    use: [Self-Built, Provider-01, Provider-02, Provider-03, Provider-04]
    url: https://www.gstatic.com/generate_204
    interval: 300

  - name: 台湾节点
    type: url-test
    filter: "🇹🇼(?!.*(?!🇨🇳)[🇦-🇿]{2})"
    use: [Self-Built, Provider-01, Provider-02, Provider-03, Provider-04]
    url: https://www.gstatic.com/generate_204
    interval: 300

  - name: 狮城节点
    type: url-test
    filter: "🇸🇬(?!.*[🇦-🇿]{2})"
    use: [Self-Built, Provider-01, Provider-02, Provider-03, Provider-04]
    url: https://www.gstatic.com/generate_204
    interval: 300

  - name: 日韩节点
    type: url-test
    filter: "(🇯🇵|🇰🇷)(?!.*[🇦-🇿]{2})"
    use: [Self-Built, Provider-01, Provider-02, Provider-03, Provider-04]
    url: https://www.gstatic.com/generate_204
    interval: 300

  - name: 美国节点
    type: url-test
    filter: "(🇺🇸|🇺🇲)(?!.*[🇦-🇿]{2})"
    use: [Self-Built, Provider-01, Provider-02, Provider-03, Provider-04]
    url: https://www.gstatic.com/generate_204
    interval: 300

  - name: 欧盟节点
    type: url-test
    filter: "(🇦🇹|🇧🇪|🇧🇬|🇭🇷|🇨🇾|🇨🇿|🇩🇰|🇪🇪|🇫🇮|🇫🇷|🇩🇪|🇬🇷|🇭🇺|🇮🇪|🇮🇹|🇱🇻|🇱🇹|🇱🇺|🇲🇹|🇳🇱|🇵🇱|🇵🇹|🇷🇴|🇸🇰|🇸🇮|🇪🇸|🇸🇪)(?!.*[🇦-🇿]{2})"
    use: [Self-Built, Provider-01, Provider-02, Provider-03, Provider-04]
    url: https://www.gstatic.com/generate_204
    interval: 300

  - name: 无限流量
    type: url-test
    filter: "(🇱🇹)(?!.*[🇦-🇿]{2})"
    use: [Self-Built, Provider-01, Provider-02, Provider-03, Provider-04]
    url: https://www.gstatic.com/generate_204
    interval: 300

  - name: 其他节点
    type: url-test
    filter: "^(?!.*(🇨🇳|🇭🇰|🇹🇼|🇸🇬|🇯🇵|🇰🇷|🇺🇸|🇺🇲|🇦🇹|🇧🇪|🇧🇬|🇭🇷|🇨🇾|🇨🇿|🇩🇰|🇪🇪|🇫🇮|🇫🇷|🇩🇪|🇬🇷|🇭🇺|🇮🇪|🇮🇹|🇱🇻|🇱🇹|🇱🇺|🇲🇹|🇳🇱|🇵🇱|🇵🇹|🇷🇴|🇸🇰|🇸🇮|🇪🇸|🇸🇪)(?!.*[🇦-🇿]{2}))"
    use: [Self-Built, Provider-01, Provider-02, Provider-03, Provider-04]
    url: https://www.gstatic.com/generate_204
    interval: 300

  - name: 广告拦截
    type: select
    proxies: [REJECT, DIRECT]

  - name: 漏网之鱼
    type: select
    proxies: [拥抱自由, 自动选择, 🔗 链式落地, DIRECT]

# ----------------------------------------------------------
# 5. 远程规则集 (MRS 极致性能混合版)
# ----------------------------------------------------------
rule-providers:
  # ==========================================
  # 🟢 个人私有规则 (小体积，保持 text 格式方便随时修改)
  # ==========================================
  mydirect:
    type: http
    behavior: classical
    format: text
    url: "https://raw.githubusercontent.com/rrrryan-ted/clashrule/refs/heads/main/mydirect.list"
    path: ./ruleset/dir1.yaml
    interval: 86400

  mywebsite:
    type: http
    behavior: classical
    format: text
    url: "https://raw.githubusercontent.com/rrrryan-ted/clashrule/refs/heads/main/mywebsite.list"
    path: ./ruleset/myweb.yaml
    interval: 86400

  ai_list:
    type: http
    behavior: classical
    format: text
    url: "https://raw.githubusercontent.com/rrrryan-ted/clashrule/refs/heads/main/ai.list"
    path: ./ruleset/ai.yaml
    interval: 86400

  lan_list:
    type: http
    behavior: classical
    format: text
    url: "https://raw.githubusercontent.com/rrrryan-ted/clashrule/refs/heads/main/LocalAreaNetwork.list"
    path: ./ruleset/lan.yaml
    interval: 86400

  download_list:
    type: http
    behavior: classical
    format: text
    url: "https://raw.githubusercontent.com/rrrryan-ted/clashrule/refs/heads/main/download.list"
    path: ./ruleset/dl.yaml
    interval: 86400

  # ==========================================
  # 🚀 公共巨型规则 (大体积，全面替换为 MetaCubeX 官方 MRS 二进制格式，实现毫秒级启动)
  # 注意：由于采用 MRS，behavior 已严格分为 domain 或 ipcidr
  # ==========================================
  
  # --- 广告拦截 ---
  ban_ad:
    type: http
    behavior: domain
    format: mrs
    url: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/category-ads-all.mrs"
    path: ./ruleset/ads.mrs
    interval: 86400

  # --- 海外流媒体与特定应用 ---
  netflix_list:
    type: http
    behavior: domain
    format: mrs
    url: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/netflix.mrs"
    path: ./ruleset/nf.mrs
    interval: 86400

  tiktok_list:
    type: http
    behavior: domain
    format: mrs
    url: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/tiktok.mrs"
    path: ./ruleset/tk.mrs
    interval: 86400

  twitter_list:
    type: http
    behavior: domain
    format: mrs
    url: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/twitter.mrs"
    path: ./ruleset/tw.mrs
    interval: 86400

  onedrive_list:
    type: http
    behavior: domain
    format: mrs
    url: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/onedrive.mrs"
    path: ./ruleset/od.mrs
    interval: 86400

  # --- 国内大满贯 (域名篇) ---
  china_domain:
    type: http
    behavior: domain
    format: mrs
    url: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/cn.mrs"
    path: ./ruleset/cn_dom.mrs
    interval: 86400

  # --- 国内大满贯 (IP 篇) ---
