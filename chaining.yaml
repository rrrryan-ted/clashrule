# ==========================================================
# Mihomo (Clash.Meta) 最终全功能全接管配置文件
# 特性：新版 dialer-proxy 链式代理 (入口节点直连化)
# ==========================================================

port: 7890
socks-port: 7891
mixed-port: 7893
tproxy-port: 7894
ipv6: false
mode: rule
log-level: info
allow-lan: true
unified-delay: true
external-controller: 0.0.0.0:9090
secret: "123456"

# ----------------------------------------------------------
# 1. 透明代理接管 (Tun 模式)
# ----------------------------------------------------------
tun:
  enable: true
  stack: system
  auto-route: true
  auto-detect-interface: true
  # --- 精准劫持优化 ---
  # 剔除 any:53，明确指定只劫持发往主路由/网关的 DNS 请求。
  # 这样发往局域网内其他设备（如特定 Docker 容器或 NAS 自带 DNS 服务）的解析就不会被误伤。
  dns-hijack:
    - 192.168.1.1:53          # 替换为你实际的路由器 IP
    - "tcp://192.168.1.1:53"  # 替换为你实际的路由器 IP

# ----------------------------------------------------------
# 2. DNS 防泄漏核心 (已修复)
# ----------------------------------------------------------
dns:
  enable: true
  listen: 0.0.0.0:1053
  ipv6: false
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  
  # 建议添加常用 fake-ip 过滤，避免本地网络设备、NTP 时间同步等异常
  fake-ip-filter:
    - "*.lan"
    - "*.localdomain"
    - "+.stun.*.*"
    - "+.ntp.*.*"
    - "time.*.com"
    - "time.*.gov"
    - "time.*.edu.cn"

  # 基础 DNS，仅用于解析 DoH 域名的 IP，用国内 DNS 即可
  default-nameserver:
    - 223.5.5.5
    - 119.29.29.29

  # 【防漏核心 1】代理服务器专用解析，走国内直连最快
  proxy-server-nameserver:
    - https://dns.alicdn.com/dns-query
    - tls://223.5.5.5

  # 【防漏核心 2】默认 DNS（兜底 DNS）必须是可信的境外 DNS！
  # 任何未命中下方 policy 的未知域名，全军发往境外 DNS，绝不告诉国内 ISP。
  nameserver:
    - https://dns.google/dns-query
    - https://1.1.1.1/dns-query

  # 【防漏核心 3】精准分流：只有明确是国内的域名，才允许发给国内 DNS 解析
  nameserver-policy:
    "geosite:cn,private,apple,microsoft": [https://dns.alicdn.com/dns-query, https://doh.pub/dns-query]
    # 利用你引入的规则集进一步明确国内域名走国内 DNS
    "rule-set:china_domain": [https://dns.alicdn.com/dns-query, https://doh.pub/dns-query]

  # 彻底删除 fallback 和 fallback-filter，在 Meta 中不需要旧时代的并发查询了。

# ----------------------------------------------------------
# 3. 代理集合 (4个机场 + 1个自建)
# ----------------------------------------------------------
proxy-providers:
  Provider-01:
    type: http
    url: "xxxxxxxxxxxxxxxxxxaaaaaaaaaaaaxxxxxxxxxxxxxxxxxxaaaaaaaaaaaa"
    interval: 3600
    path: ./proxies/p1.yaml
    health-check: {enable: true, interval: 600, url: https://www.gstatic.com/generate_204}
  Provider-02:
    type: http
    url: "xxxxxxxxxxxxxxxxxxaaaaaaaaaaaaxxxxxxxxxxxxxxxxxxaaaaaaaaaaaa"
    interval: 3600
    path: ./proxies/p2.yaml
    health-check: {enable: true, interval: 600, url: https://www.gstatic.com/generate_204}
  Provider-03:
    type: http
    url: "xxxxxxxxxxxxxxxxxxaaaaaaaaaaaaxxxxxxxxxxxxxxxxxxaaaaaaaaaaaa"
    interval: 3600
    path: ./proxies/p3.yaml
    health-check: {enable: true, interval: 600, url: https://www.gstatic.com/generate_204}
  Provider-04:
    type: http
    url: "xxxxxxxxxxxxxxxxxxaaaaaaaaaaaaxxxxxxxxxxxxxxxxxxaaaaaaaaaaaa"
    interval: 3600
    path: ./proxies/p4.yaml
    health-check: {enable: true, interval: 600, url: https://www.gstatic.com/generate_204}
  Self-Built:
    type: http
    url: "xxxxxxxxxxxxxxxxxxaaaaaaaaaaaaxxxxxxxxxxxxxxxxxxaaaaaaaaaaaa"
    interval: 3600
    path: ./proxies/sb.yaml
    health-check: {enable: true, interval: 600, url: https://www.gstatic.com/generate_204}

# ----------------------------------------------------------
# 4. 策略组 (已优化入口节点逻辑)
# ----------------------------------------------------------
proxy-groups:
  # --- 业务分流组 ---
  - name: 拥抱自由
    type: select
    proxies: [自动选择, 🏠 自建节点, 🔗 链式落地, 香港节点, 台湾节点, 狮城节点, 日韩节点, 美国节点, 欧盟节点, 其他节点, 无限流量]

  # --- 入口节点：只从 Provider 筛选具体物理节点，禁止嵌套其他组 ---
  - name: 🚪 入口节点
    type: select
    use: [Provider-01, Provider-02, Provider-03, Provider-04, Self-Built]
    filter: "🇭🇰|🇹🇼|🇯🇵|🇸🇬" # 建议只选择延迟低的近场节点作为入口

  - name: 🏠 自建节点
    type: select
    use: [Self-Built] # 引用你 Sub-Store 的那个订阅

  # --- 落地节点：通过入口进行拨号 ---
  - name: 🔗 链式落地
    type: select
    dialer-proxy: 🚪 入口节点
    use: [Self-Built]

  - name: 自动选择
    type: url-test
    url: https://www.gstatic.com/generate_204
    interval: 60
    use: [Provider-01, Provider-02, Provider-03, Provider-04, Self-Built]

  - name: 人工智能
    type: select
    proxies: [🔗 链式落地, 台湾节点, 狮城节点, 日韩节点, 美国节点, 欧盟节点, 其他节点, 拥抱自由, 自动选择, 无限流量]

  - name: Netflix
    type: select
    proxies: [🔗 链式落地, 香港节点, 台湾节点, 狮城节点, 日韩节点, 美国节点, 欧盟节点, 其他节点, 拥抱自由, 自动选择, 无限流量]

  - name: Onedrive
    type: select
    proxies: [香港节点, 台湾节点, 狮城节点, 日韩节点, 美国节点, 欧盟节点, 其他节点, 拥抱自由, 自动选择, 无限流量]

  - name: TikTok
    type: select
    proxies: [香港节点, 台湾节点, 狮城节点, 日韩节点, 美国节点, 欧盟节点, 其他节点, 拥抱自由, 自动选择, 无限流量]

  - name: Twitter
    type: select
    proxies: [香港节点, 台湾节点, 狮城节点, 日韩节点, 美国节点, 其他节点, 其他节点, 拥抱自由, 自动选择, 无限流量]

  # --- 地区正则筛选组 ---
  - name: 香港节点
    type: url-test
    filter: "🇭🇰(?!.*(?!🇨🇳)[🇦-🇿]{2})"
    use: [Provider-01, Provider-02, Provider-03, Provider-04, Self-Built]
    url: https://www.gstatic.com/generate_204
    interval: 60

  - name: 台湾节点
    type: url-test
    filter: "🇹🇼(?!.*(?!🇨🇳)[🇦-🇿]{2})"
    use: [Provider-01, Provider-02, Provider-03, Provider-04, Self-Built]
    url: https://www.gstatic.com/generate_204
    interval: 60

  - name: 狮城节点
    type: url-test
    filter: "🇸🇬(?!.*[🇦-🇿]{2})"
    use: [Provider-01, Provider-02, Provider-03, Provider-04, Self-Built]
    url: https://www.gstatic.com/generate_204
    interval: 60

  - name: 日韩节点
    type: url-test
    filter: "(🇯🇵|🇰🇷)(?!.*[🇦-🇿]{2})"
    use: [Provider-01, Provider-02, Provider-03, Provider-04, Self-Built]
    url: https://www.gstatic.com/generate_204
    interval: 60

  - name: 美国节点
    type: url-test
    filter: "(🇺🇸|🇺🇲)(?!.*[🇦-🇿]{2})"
    use: [Provider-01, Provider-02, Provider-03, Provider-04, Self-Built]
    url: https://www.gstatic.com/generate_204
    interval: 60

  - name: 欧盟节点
    type: url-test
    filter: "(🇦🇹|🇧🇪|🇧🇬|🇭🇷|🇨🇾|🇨🇿|🇩🇰|🇪🇪|🇫🇮|🇫🇷|🇩🇪|🇬🇷|🇭🇺|🇮🇪|🇮🇹|🇱🇻|🇱🇹|🇱🇺|🇲🇹|🇳🇱|🇵🇱|🇵🇹|🇷🇴|🇸🇰|🇸🇮|🇪🇸|🇸🇪)(?!.*[🇦-🇿]{2})"
    use: [Provider-01, Provider-02, Provider-03, Provider-04, Self-Built]
    url: https://www.gstatic.com/generate_204
    interval: 60

  - name: 无限流量
    type: url-test
    filter: "(🇱🇹)(?!.*[🇦-🇿]{2})"
    use: [Provider-01, Provider-02, Provider-03, Provider-04, Self-Built]
    url: https://www.gstatic.com/generate_204
    interval: 60

  - name: 其他节点
    type: url-test
    filter: "^(?!.*(🇨🇳|🇭🇰|🇹🇼|🇸🇬|🇯🇵|🇰🇷|🇺🇸|🇺🇲|🇦🇹|🇧🇪|🇧🇬|🇭🇷|🇨🇾|🇨🇿|🇩🇰|🇪🇪|🇫🇮|🇫🇷|🇩🇪|🇬🇷|🇭🇺|🇮🇪|🇮🇹|🇱🇻|🇱🇹|🇱🇺|🇲🇹|🇳🇱|🇵🇱|🇵🇹|🇷🇴|🇸🇰|🇸🇮|🇪🇸|🇸🇪)(?!.*[🇦-🇿]{2}))"
    use: [Provider-01, Provider-02, Provider-03, Provider-04, Self-Built]
    url: https://www.gstatic.com/generate_204
    interval: 60

  # (此处省略 台湾、狮城、日韩、欧盟、无限流量、其他节点 组，逻辑与上述一致)

  - name: 广告拦截
    type: select
    proxies: [REJECT, DIRECT]

  - name: 漏网之鱼
    type: select
    proxies: [DIRECT, 🔗 链式落地, 拥抱自由, 自动选择]

