    type: http
    behavior: domain
    format: mrs
    url: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/google@cn.mrs"
    path: ./ruleset/g_cn.mrs
    interval: 86400

  steam_cn:
    type: http
    behavior: domain
    format: mrs
    url: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/steam@cn.mrs"
    path: ./ruleset/st_cn.mrs
    interval: 86400

  # --- 终极翻墙兜底名单 ---
