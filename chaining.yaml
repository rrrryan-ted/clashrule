# ==========================================================
# Mihomo (Clash.Meta) 最终全功能全接管配置文件
# 特性：新版 dialer-proxy 链式代理 (入口节点直连化)
# ==========================================================

port: 7890
socks-port: 7891
mixed-port: 7893
tproxy-port: 7894
ipv6: false
mode: rule
log-level: info
allow-lan: true
unified-delay: true
external-controller: 0.0.0.0:9090
secret: "123456"

# ----------------------------------------------------------
# 1. 透明代理接管 (Tun 模式)
# ----------------------------------------------------------
tun:
  enable: true
  stack: system
  auto-route: true
  auto-detect-interface: true
  dns-hijack: [any:53, "tcp://any:53"]

# ----------------------------------------------------------
# 2. DNS 防泄漏核心
# ----------------------------------------------------------
dns:
  enable: true
  listen: 0.0.0.0:1053
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  # 关键点 1：必须使用纯 IP 形式的 DNS，用于解析后面所有的 DoH 域名
  default-nameserver:
    - 223.5.5.5
    - 119.29.29.29
    - 1.1.1.1
    - 8.8.8.8
  
  # 关键点 2：nameserver 负责国内域名和默认解析
  nameserver:
    - https://dns.alicdn.com/dns-query
    - https://doh.pub/dns-query
  
  # 关键点 3：fallback 负责国外域名的防污染解析（fake-ip 下必选，防止后端判定错误）
  fallback:
    - https://dns.google/dns-query
    - https://1.1.1.1/dns-query
    - tls://8.8.4.4
  
  # 关键点 4：解析代理服务器（机场/自建）专用，防止死循环
  proxy-server-nameserver:
    - https://dns.alicdn.com/dns-query # 优先用国内 DoH 解析代理域名，速度最快
    - 223.5.5.5
    - 202.175.3.8 # 你保留的特定 DNS
  
  # 关键点 5：强制分流策略
  nameserver-policy:
    "geosite:cn,private": [https://dns.alicdn.com/dns-query, https://doh.pub/dns-query]
    "geosite:gfw,google,netflix,tiktok,telegram,twitter": [https://dns.google/dns-query, https://1.1.1.1/dns-query]
  
  # 关键点 6：配置嗅探，防止 DNS 劫持
  fallback-filter:
    geoip: true
    geoip-code: CN
    ipcidr: [240.0.0.0/4]

# ----------------------------------------------------------
# 3. 代理集合 (4个机场 + 1个自建)
# ----------------------------------------------------------
proxy-providers:
  Provider-01:
    type: http
    url: "xxxxxxxxxxxxxxxxxxxxx"
    interval: 3600
    path: ./proxies/p1.yaml
    health-check: {enable: true, interval: 600, url: https://www.gstatic.com/generate_204}
  Provider-02:
    type: http
    url: "xxxxxxxxxxxxxxxxxxxxx"
    interval: 3600
    path: ./proxies/p2.yaml
    health-check: {enable: true, interval: 600, url: https://www.gstatic.com/generate_204}
  Provider-03:
    type: http
    url: "xxxxxxxxxxxxxxxxxxxxx"
    interval: 3600
    path: ./proxies/p3.yaml
    health-check: {enable: true, interval: 600, url: https://www.gstatic.com/generate_204}
  Provider-04:
    type: http
    url: "xxxxxxxxxxxxxxxxxxxxx"
    interval: 3600
    path: ./proxies/p4.yaml
    health-check: {enable: true, interval: 600, url: https://www.gstatic.com/generate_204}
  Self-Built:
    type: http
    url: "xxxxxxxxxxxxxxxxxxxxx"
    interval: 3600
    path: ./proxies/sb.yaml
    health-check: {enable: true, interval: 600, url: https://www.gstatic.com/generate_204}

# ----------------------------------------------------------
# 4. 策略组 (已优化入口节点逻辑)
# ----------------------------------------------------------
proxy-groups:
  # --- 入口节点：只从 Provider 筛选具体物理节点，禁止嵌套其他组 ---
  - name: 🚪 入口节点
    type: select
    use: [Provider-01, Provider-02, Provider-03, Provider-04, Self-Built]
    filter: "🇭🇰|🇸🇬|🇯🇵|🇹🇼" # 建议只选择延迟低的近场节点作为入口

  # --- 落地节点：通过入口进行拨号 ---
  - name: 🔗 链式落地
    type: select
    dialer-proxy: 🚪 入口节点
    use: [Self-Built]

  # --- 业务分流组 ---
  - name: 拥抱自由
    type: select
    proxies: [自动选择, 🔗 链式落地, 香港节点, 台湾节点, 狮城节点, 日韩节点, 美国节点, 欧盟节点, 其他节点, 无限流量]

  - name: 自动选择
    type: url-test
    url: https://www.gstatic.com/generate_204
    interval: 60
    use: [Provider-01, Provider-02, Provider-03, Provider-04, Self-Built]

  - name: 人工智能
    type: select
    proxies: [🔗 链式落地, 台湾节点, 狮城节点, 日韩节点, 美国节点, 欧盟节点, 其他节点, 拥抱自由, 自动选择, 无限流量]

  - name: Netflix
    type: select
    proxies: [🔗 链式落地, 香港节点, 台湾节点, 狮城节点, 日韩节点, 美国节点, 欧盟节点, 其他节点, 拥抱自由, 自动选择, 无限流量]

  - name: Onedrive
    type: select
    proxies: [香港节点, 台湾节点, 狮城节点, 日韩节点, 美国节点, 欧盟节点, 其他节点, 拥抱自由, 自动选择, 无限流量]

  - name: TikTok
    type: select
    proxies: [香港节点, 台湾节点, 狮城节点, 日韩节点, 美国节点, 欧盟节点, 其他节点, 拥抱自由, 自动选择, 无限流量]

  - name: Twitter
    type: select
    proxies: [香港节点, 台湾节点, 狮城节点, 日韩节点, 美国节点, 其他节点, 其他节点, 拥抱自由, 自动选择, 无限流量]

  # --- 地区正则筛选组 ---
  - name: 香港节点
    type: url-test
    filter: "🇭🇰(?!.*(?!🇨🇳)[🇦-🇿]{2})"
    use: [Provider-01, Provider-02, Provider-03, Provider-04, Self-Built]
    url: https://www.gstatic.com/generate_204
    interval: 60

  - name: 台湾节点
    type: url-test
    filter: "🇹🇼(?!.*(?!🇨🇳)[🇦-🇿]{2})"
    use: [Provider-01, Provider-02, Provider-03, Provider-04, Self-Built]
    url: https://www.gstatic.com/generate_204
    interval: 60

  - name: 狮城节点
    type: url-test
    filter: "🇸🇬(?!.*[🇦-🇿]{2})"
    use: [Provider-01, Provider-02, Provider-03, Provider-04, Self-Built]
    url: https://www.gstatic.com/generate_204
    interval: 60

  - name: 日韩节点
    type: url-test
    filter: "(🇯🇵|🇰🇷)(?!.*[🇦-🇿]{2})"
    use: [Provider-01, Provider-02, Provider-03, Provider-04, Self-Built]
    url: https://www.gstatic.com/generate_204
    interval: 60

  - name: 美国节点
    type: url-test
    filter: "(🇺🇸|🇺🇲)(?!.*[🇦-🇿]{2})"
    use: [Provider-01, Provider-02, Provider-03, Provider-04, Self-Built]
    url: https://www.gstatic.com/generate_204
    interval: 60

  - name: 欧盟节点
    type: url-test
    filter: "(🇦🇹|🇧🇪|🇧🇬|🇭🇷|🇨🇾|🇨🇿|🇩🇰|🇪🇪|🇫🇮|🇫🇷|🇩🇪|🇬🇷|🇭🇺|🇮🇪|🇮🇹|🇱🇻|🇱🇹|🇱🇺|🇲🇹|🇳🇱|🇵🇱|🇵🇹|🇷🇴|🇸🇰|🇸🇮|🇪🇸|🇸🇪)(?!.*[🇦-🇿]{2})"
    use: [Provider-01, Provider-02, Provider-03, Provider-04, Self-Built]
    url: https://www.gstatic.com/generate_204
    interval: 60

  - name: 无限流量
    type: url-test
    filter: "(🇱🇹)(?!.*[🇦-🇿]{2})"
    use: [Provider-01, Provider-02, Provider-03, Provider-04, Self-Built]
    url: https://www.gstatic.com/generate_204
    interval: 60

  - name: 其他节点
    type: url-test
    filter: "^(?!.*(🇨🇳|🇭🇰|🇹🇼|🇸🇬|🇯🇵|🇰🇷|🇺🇸|🇺🇲|🇦🇹|🇧🇪|🇧🇬|🇭🇷|🇨🇾|🇨🇿|🇩🇰|🇪🇪|🇫🇮|🇫🇷|🇩🇪|🇬🇷|🇭🇺|🇮🇪|🇮🇹|🇱🇻|🇱🇹|🇱🇺|🇲🇹|🇳🇱|🇵🇱|🇵🇹|🇷🇴|🇸🇰|🇸🇮|🇪🇸|🇸🇪)(?!.*[🇦-🇿]{2}))"
    use: [Provider-01, Provider-02, Provider-03, Provider-04, Self-Built]
    url: https://www.gstatic.com/generate_204
    interval: 60

  # (此处省略 台湾、狮城、日韩、欧盟、无限流量、其他节点 组，逻辑与上述一致)

  - name: 广告拦截
    type: select
    proxies: [REJECT, DIRECT]

  - name: 漏网之鱼
    type: select
    proxies: [DIRECT, 🔗 链式落地, 拥抱自由, 自动选择]

